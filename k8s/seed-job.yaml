apiVersion: batch/v1
kind: Job
metadata:
  name: registry-seeder
spec:
  ttlSecondsAfterFinished: 120
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-registry
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Registry to be ready..."
              until wget -qO- http://registry:5176/api/health > /dev/null 2>&1; do
                echo "  Registry not ready, retrying in 3s..."
                sleep 3
              done
              echo "Registry is up."
      containers:
        - name: seeder
          image: node:20-alpine
          command:
            - node
            - -e
            - |
              const http = require('http');
              const fs = require('fs');

              const REGISTRY = 'http://registry:5176';
              const records = JSON.parse(fs.readFileSync('/data/seed-data.json', 'utf8'));

              function get(url) {
                return new Promise((resolve, reject) => {
                  http.get(url, res => {
                    let body = '';
                    res.on('data', c => body += c);
                    res.on('end', () => resolve({ status: res.statusCode, body }));
                  }).on('error', reject);
                });
              }

              function post(path, data) {
                return new Promise((resolve, reject) => {
                  const payload = JSON.stringify(data);
                  const req = http.request(
                    { hostname: 'registry', port: 5176, path, method: 'POST',
                      headers: { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(payload) } },
                    res => {
                      let body = '';
                      res.on('data', c => body += c);
                      res.on('end', () => resolve(res.statusCode));
                    }
                  );
                  req.on('error', reject);
                  req.write(payload);
                  req.end();
                });
              }

              async function run() {
                const check = await get(`${REGISTRY}/api/deployments`);
                const existing = JSON.parse(check.body);
                if (existing.length > 0) {
                  console.log(`Already seeded (${existing.length} records). Skipping.`);
                  return;
                }
                console.log(`Seeding ${records.length} records...`);
                let ok = 0, fail = 0;
                for (const r of records) {
                  const status = await post('/api/deployments', r);
                  if (status >= 200 && status < 300) { ok++; }
                  else { console.error(`WARN: ${r.serviceName} v${r.version} -> HTTP ${status}`); fail++; }
                }
                console.log(`Done. ${ok} inserted, ${fail} failed.`);
                if (fail > 0) process.exit(1);
              }

              run().catch(e => { console.error(e.message); process.exit(1); });
          volumeMounts:
            - name: seed-data
              mountPath: /data
      volumes:
        - name: seed-data
          configMap:
            name: seed-data
