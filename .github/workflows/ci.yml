name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  # This will tag images as 'ghcr.io/poorvappp/hiring-assignment-devex/insights'
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. RUN TESTS (Insights Service)
      # This fulfills the "Runs tests" requirement. 
      # It ensures broken code doesn't get containerized.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './deployment-insights/package-lock.json'

      - name: Install Dependencies
        run: |
          cd deployment-insights
          npm ci

      - name: Lint
        run: |
          cd deployment-insights
          npm run lint

      - name: Format Check
        run: |
          cd deployment-insights
          npm run format:check

      - name: Run Unit Tests
        run: |
          cd deployment-insights
          npm test

      # 2. LOGIN TO REGISTRY
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. BUILD & PUSH (Insights Service)
      - name: Build and push Insights
        uses: docker/build-push-action@v5
        with:
          context: ./deployment-insights
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/insights:latest

      # 4. BUILD & PUSH (Registry Service)
      - name: Build and push Registry
        uses: docker/build-push-action@v5
        with:
          context: ./deployment-registry
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/registry:latest
